# ═══════════════════════════════════════════════
#  Angelina Belokon — конфигурация для системного Nginx
# ═══════════════════════════════════════════════
#
#  Архитектура проще, чем у стеков с внутренним роутером: ОДИН процесс NestJS
#  на 127.0.0.1:4280 сам отдаёт и SSR-страницу, и статику (/assets, /fonts,
#  /og.png…), и /api. Поэтому здесь ОДИН upstream и ОДИН `location /` —
#  всё уходит в приложение.
#
#  Что НЕ дублируем здесь (это уже делает само приложение):
#    • security-заголовки — helmet (CSP, HSTS, X-Frame-Options,
#      X-Content-Type-Options, Referrer-Policy) в src/bootstrap/configure.ts;
#    • Cache-Control ассетов — умная логика в configure.ts (шрифты immutable,
#      app.js/картинки — короткий revalidate). Перебивать её на краю нельзя;
#    • сжатие ответов приложения — middleware `compression`.
#
#  Установка:
#    sudo cp nginx/angelina.conf /etc/nginx/sites-available/angelina.conf
#    sudo ln -s /etc/nginx/sites-available/angelina.conf /etc/nginx/sites-enabled/
#    sudo nginx -t && sudo systemctl reload nginx
#
#  SSL (certbot сам допишет 443-блок и редирект 80→443):
#    sudo certbot --nginx -d angelina.tolkachev.space
#
#  ⚠️ В .env / окружении приложения под этот домен выставьте:
#       SITE_URL=https://angelina.tolkachev.space
#       CONTACT_EMAIL=hello@angelina.tolkachev.space   # или реальный адрес
#       TRUST_PROXY=true      # ОДИН хоп nginx→NestJS; без этого rate-limit
#                             # будет считать всех клиентов одним IP прокси
#     И опубликуйте контейнер только на loopback (docker-compose.yml):
#       ports: ["127.0.0.1:4280:4280"]   — чтобы в обход nginx не достучаться.

# Корректный WebSocket-upgrade + keep-alive к upstream (на будущее; сейчас
# приложение WS не использует, но boilerplate безвреден):
#   обычный запрос → Connection: "" (keep-alive живёт);
#   ws-запрос      → Connection: upgrade.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}

# Upstream: приложение NestJS. Публикуется только на 127.0.0.1:4280, наружу —
# недоступно в обход nginx. Именно 127.0.0.1 (IPv4), не localhost, — порт
# биндится на IPv4-loopback; localhost мог бы уйти на ::1 и получить refused.
upstream angelina_upstream {
    server 127.0.0.1:4280;
    keepalive 32;
}

# Основной сервер. Пока HTTP — certbot автоматически добавит SSL и редирект.
server {
    listen 80;
    listen [::]:80;
    server_name angelina.tolkachev.space;

    # Тело запроса: контактная форма шлёт крошечный JSON, файлов нет.
    # Дефолта (1m) с запасом хватает; ставим явно.
    client_max_body_size 1m;

    # Логи
    access_log /var/log/nginx/angelina.access.log;
    error_log  /var/log/nginx/angelina.error.log;

    # Gzip только на случай ответов, которые генерирует сам nginx (страницы
    # ошибок): ответы приложения уже сжаты его `compression`, nginx их не
    # пережимает.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # Всё (SSR-страница, статика, /api) → приложение NestJS.
    location / {
        proxy_pass http://angelina_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
