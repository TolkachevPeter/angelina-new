services:
  app:
    build: .
    restart: unless-stopped
    ports:
      # Bound to loopback only — reachable exclusively through the system nginx
      # (see nginx/angelina.conf), never directly from outside.
      - "127.0.0.1:4280:4280"
    environment:
      - NODE_ENV=production
      - PORT=4280
      - LEADS_PATH=/app/data/leads.json
      # Behind nginx (one hop): trust X-Forwarded-For so rate limiting sees the
      # real client IP instead of the proxy's.
      - TRUST_PROXY=true
      # --- SEO / branding: set these for your real deployment ---
      - SITE_URL=${SITE_URL:-https://angelina.tolkachev.space}
      - CONTACT_EMAIL=${CONTACT_EMAIL:-hello@angelina.tolkachev.space}
      # - SOCIAL_LINKS=https://instagram.com/ang.belokon,https://ounce.agency
    volumes:
      - leads-data:/app/data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://127.0.0.1:4280/api/health/live',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  leads-data:
